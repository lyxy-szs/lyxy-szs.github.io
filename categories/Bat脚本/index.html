<script>
    var mobileBtn = function f() {
        var toggleMenu = document.getElementsByClassName("menu-toggle")[0];
        var mobileMenu = document.getElementById("mobile-menu");
        if (toggleMenu.classList.contains("active")) {
            toggleMenu.classList.remove("active")
            mobileMenu.classList.remove("active")
        } else {
            toggleMenu.classList.add("active")
            mobileMenu.classList.add("active")
        }
    }

    // 主题切换逻辑（完全重构：适配Chic原生dark-theme + 同步session/localStorage）
    // ========== 主题切换：自动识别系统深色模式 + 手动切换 + 持久化 ==========
$(document).ready(function() {
    const $switch = $('#switch_default');
    const $mobileThemeToggle = $('#mobile-toggle-theme');
    const $body = $('body');
    const THEME_STORAGE_KEY = 'chic_theme_mode';
    // 检测系统深色模式的媒体查询
    const darkModeMedia = window.matchMedia('(prefers-color-scheme: dark)');

    // 核心函数：切换主题（同步DOM/存储/按钮文字）
    const switchTheme = (isDark) => {
        if (isDark) {
            $body.addClass('dark-theme');
            $switch.prop('checked', true);
            $mobileThemeToggle.text('·&nbsp;Dark');
            localStorage.setItem(THEME_STORAGE_KEY, 'dark');
            window.sessionStorage.theme = 'dark';
        } else {
            $body.removeClass('dark-theme');
            $switch.prop('checked', false);
            $mobileThemeToggle.text('·&nbsp;Light');
            localStorage.setItem(THEME_STORAGE_KEY, 'light');
            window.sessionStorage.theme = 'light';
        }
    };

    // 1. 初始化主题：优先用户手动设置 → 其次系统深色模式 → 默认浅色
    const initTheme = () => {
        const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
        if (savedTheme) {
            // 有用户手动设置，用用户的
            switchTheme(savedTheme === 'dark');
        } else {
            // 无手动设置，自动识别系统模式
            switchTheme(darkModeMedia.matches);
        }
    };

    // 2. 监听系统深色模式变化（用户切换系统主题时，自动同步）
    darkModeMedia.addEventListener('change', (e) => {
        // 仅当用户未手动设置过主题时，才跟随系统
        if (!localStorage.getItem(THEME_STORAGE_KEY)) {
            switchTheme(e.matches);
        }
    });

    // 3. 手动切换主题（开关/移动端按钮）
    $switch.change(function() {
        switchTheme($(this).is(':checked'));
    });
    $mobileThemeToggle.click(function(e) {
        e.preventDefault();
        $switch.trigger('click');
    });

    // 初始化执行
    initTheme();
});

// ========== 原有搜索逻辑（保留不变） ==========
$(document).ready(function () {
    const $searchBtn = $('.search-btn');
    const $searchModal = $('#searchModal');
    const $searchInput = $('#searchInput');
    const $searchResult = $('#searchResult');

    // 显示/隐藏搜索框
    $searchBtn.click(function (e) {
        e.preventDefault();
        $searchModal.toggle();
        if ($searchModal.is(':visible')) {
            $searchInput.focus();
        } else {
            $searchInput.val('');
            $searchResult.empty();
        }
    });

    // 关闭搜索框
    $('.search-close').click(function () {
        $searchModal.hide();
        $searchInput.val('');
        $searchResult.empty();
    });

    // 点击外部关闭
    $(document).click(function (e) {
        if (
            !$searchModal.is(e.target) && 
            !$searchModal.has(e.target).length && 
            !$searchBtn.is(e.target)
        ) {
            $searchModal.hide();
            $searchInput.val('');
            $searchResult.empty();
        }
    });

    // 关键词搜索
    $searchInput.on('input', function () {
        const searchText = $(this).val().trim().toLowerCase();
        $searchResult.empty();

        if (searchText.length < 2) return;

        $.get('/search.xml', function (xml) {
            let hasMatch = false;
            $(xml).find('entry').each(function () {
                const title = $(this).find('title').text().toLowerCase();
                const link = $(this).find('url').text();
                const content = $(this).find('content').text().toLowerCase();

                if (title.includes(searchText) || content.includes(searchText)) {
                    $searchResult.append(`
                        <li style="padding: 10px 0;">
                            <a href="${link}?keyword=${encodeURIComponent(searchText)}" 
                               style="text-decoration: none;" 
                               target="_blank">
                                ${$(this).find('title').text()}
                            </a>
                        </li>
                    `);
                    hasMatch = true;
                }
            });

            if (!hasMatch) {
                $searchResult.append(`
                    <li style="padding: 10px; text-align: center;">未找到匹配文章</li>
                `);
            }
        }).fail(function () {
            $searchResult.append(`
                <li style="padding: 10px; color: #f44336; text-align: center;">搜索索引加载失败</li>
            `);
        });
    });
});
